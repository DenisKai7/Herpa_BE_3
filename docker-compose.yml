name: herpa
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      MINIO_ENDPOINT: minio:9000
      LLAMA_TEXT_BASE_URL: http://llama-text:8080/v1
      LLAMA_VISION_BASE_URL: http://llama-vlm:8080/v1
    ports: ["8000:8000"]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./data_pipeline:/opt/app/data_pipeline:ro
    restart: unless-stopped
    logging:
      options: {max-size: "10m", max-file: "3"}
    deploy:
      resources:
        limits: {memory: 1G}

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "mc alias set herpa http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      for b in profile-images chat-attachments generated-exports processing-temp; do mc mb --ignore-existing herpa/$$b; mc anonymous set none herpa/$$b; done"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

  llama-text:
    image: ${LLAMA_CPP_SERVER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    profiles: ["text", "ai"]
    command: >
      -m /models/Qwen_Qwen3-4B-Instruct-2507-Q6_K.gguf
      --host 0.0.0.0 --port 8080 --ctx-size ${TEXT_MODEL_CONTEXT_SIZE:-8192}
      --threads ${TEXT_MODEL_THREADS:-8} --n-gpu-layers ${TEXT_MODEL_GPU_LAYERS:-0}
      --parallel ${TEXT_MODEL_PARALLEL:-1} --alias Qwen3-4B-Instruct-2507
    volumes: ["./models:/models:ro"]
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    deploy:
      resources:
        limits: {memory: 8G}

  llama-vlm:
    image: ${LLAMA_CPP_SERVER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    profiles: ["vision", "ai"]
    command: >
      -m /models/Qwen3-VL-4B-Instruct-Q4_K_M.gguf
      --mmproj /models/mmproj-Qwen3VL-4B-Instruct-Q8_0.gguf
      --host 0.0.0.0 --port 8080 --ctx-size ${VISION_MODEL_CONTEXT_SIZE:-8192}
      --threads ${VISION_MODEL_THREADS:-8} --n-gpu-layers ${VISION_MODEL_GPU_LAYERS:-0}
      --parallel ${VISION_MODEL_PARALLEL:-1} --alias Qwen3-VL-4B-Instruct
    volumes: ["./models:/models:ro"]
    ports: ["8081:8080"]
    restart: unless-stopped
    deploy:
      resources:
        limits: {memory: 8G}

volumes:
  minio_data:
